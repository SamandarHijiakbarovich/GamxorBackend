services:
  db:
    image: postgres:16
    container_name: gamxor-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gamxor
    ports:
      - "5432:5432"
    volumes:
      - gamxor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gamxor"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamxor-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Konteynerlar tarmog'i ichida 'db' xosti ishlatiladi.
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=gamxor;Username=postgres;Password=postgres"
      ASPNETCORE_ENVIRONMENT: Production
      EnableSwagger: "true"
      Otp__FixedCode: "2580"
    ports:
      - "8080:8080"
    volumes:
      - gamxor_media:/app/wwwroot/media

volumes:
  gamxor_pgdata:
  gamxor_media:
